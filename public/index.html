<!DOCTYPE html>
<html>
<head>
    <title>Rekening Validation Demo</title>

    <link rel="icon" href="favicon.ico">

    <style>
        body {
            font-family: Arial, sans-serif;
            background: #f4f6f8;
            padding: 40px;
        }

        .container {
            max-width: 500px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 10px;
            box-shadow: 0 2px 10px #ccc;
        }

        h2 {
            text-align: center;
        }

        label {
            display: block;
            margin-top: 15px;
        }

        input, select, button {
            width: 100%;
            padding: 10px;
            margin-top: 5px;
        }

        button {
            background: #0066cc;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 20px;
        }

        button:hover {
            background: #004999;
        }

        .result {
            margin-top: 20px;
            padding: 15px;
            background: #f1f1f1;
            border-radius: 5px;
        }

        .valid {
            color: green;
            font-weight: bold;
        }

        .invalid {
            color: red;
            font-weight: bold;
        }

    </style>

</head>

<body>

<div class="container">

<h2>
    Rekening Validation Demo
</h2>

<label>
    Bank
</label>

<select id="bank">
    <option value="bca">
        BCA
    </option>

    <option value="mandiri">
        Mandiri
    </option>

</select>


<label>
    Nomor Rekening
</label>

<input 
    id="account"
    placeholder="Masukkan nomor rekening">


<button id="checkButton">
    CEK REKENING
</button>


<div class="result" id="result">
    Hasil pengecekan akan tampil di sini
</div>


</div>


<script src="app.js"></script>


</body>
</html>
